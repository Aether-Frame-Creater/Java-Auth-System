<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Auth System</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.1/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex items-center justify-center bg-base-200">
    <div class="card w-full max-w-md bg-base-100 shadow-xl">
        <div class="card-body">
            <h2 class="card-title text-2xl font-bold text-center justify-center mb-4">
                Login
            </h2>

            <div id="errorAlert" class="alert alert-error hidden">
                <span id="errorText"></span>
            </div>
            <div id="successAlert" class="alert alert-success hidden">
                <span id="successText"></span>
            </div>

            <form id="loginForm">
                <div class="form-control mb-4">
                    <label class="label" for="username">
                        <span class="label-text">Username</span>
                    </label>
                    <input type="text" id="username" class="input input-bordered" required>
                </div>

                <div class="form-control mb-4">
                    <label class="label" for="password">
                        <span class="label-text">Password</span>
                    </label>
                    <input type="password" id="password" class="input input-bordered" required>
                </div>

                <button type="submit" class="btn btn-primary w-full">
                    Login
                </button>
            </form>

            <div class="divider">OR</div>

            <div class="flex flex-col gap-2 text-center">
                <a href="register.html" class="link link-primary">Create an account</a>
                <a href="forgot-password.html" class="link link-secondary">Forgot password?</a>
            </div>
        </div>
    </div>

    <script src="assets/app.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            hideAlerts();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!username || !password) {
                showError('Please fill in all fields');
                return;
            }

            fetch(`${API_URL}/api/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            })
            .then(function(res) { return res.json(); })
            .then(function(data) {
                if (data.success) {
                    localStorage.setItem('user', JSON.stringify(data.data));
                    window.location.href = 'dashboard.html';
                } else {
                    showError(data.message);
                }
            })
            .catch(function() {
                showError('Connection error. Make sure the backend is running.');
            });
        });
    </script>
</body>
</html>
