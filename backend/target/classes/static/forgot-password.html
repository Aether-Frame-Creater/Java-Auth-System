<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Auth System</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.1/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex items-center justify-center bg-base-200">
    <div class="card w-full max-w-md bg-base-100 shadow-xl">
        <div class="card-body">
            <h2 class="card-title text-2xl font-bold text-center justify-center mb-4">
                Forgot Password
            </h2>
            <p class="text-sm text-gray-500 text-center mb-4">
                Enter your email to receive a reset token.
            </p>

            <div id="errorAlert" class="alert alert-error hidden">
                <span id="errorText"></span>
            </div>
            <div id="successAlert" class="alert alert-success hidden">
                <span id="successText"></span>
            </div>

            <!-- Step 1: Request Reset Token -->
            <div id="step1">
                <form id="forgotForm">
                    <div class="form-control mb-4">
                        <label class="label" for="email">
                            <span class="label-text">Email</span>
                        </label>
                        <input type="email" id="email" class="input input-bordered" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-full">
                        Send Reset Token
                    </button>
                </form>
            </div>

            <!-- Step 2: Reset Password (shown after token request) -->
            <div id="step2" class="hidden">
                <form id="resetForm">
                    <div class="form-control mb-4">
                        <label class="label" for="token">
                            <span class="label-text">Reset Token</span>
                        </label>
                        <input type="text" id="token" class="input input-bordered" required>
                    </div>

                    <div class="form-control mb-4">
                        <label class="label" for="newPassword">
                            <span class="label-text">New Password</span>
                        </label>
                        <input type="password" id="newPassword" class="input input-bordered" required minlength="6">
                        <label class="label">
                            <span class="label-text-alt">At least 6 characters</span>
                        </label>
                    </div>

                    <button type="submit" class="btn btn-success w-full">
                        Reset Password
                    </button>
                </form>
            </div>

            <div class="divider">OR</div>

            <div class="flex flex-col gap-2 text-center">
                <a href="index.html" class="link link-primary">Back to Login</a>
                <a href="register.html" class="link link-secondary">Create an account</a>
            </div>
        </div>
    </div>

    <script src="assets/app.js"></script>
    <script>
        document.getElementById('forgotForm').addEventListener('submit', function(e) {
            e.preventDefault();
            hideAlerts();

            const email = document.getElementById('email').value.trim();
            if (!email) {
                showError('Please enter your email');
                return;
            }

            fetch(`${API_URL}/api/auth/forgot-password`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            })
            .then(function(res) { return res.json(); })
            .then(function(data) {
                if (data.success) {
                    showSuccess(data.message);
                    document.getElementById('step1').classList.add('hidden');
                    document.getElementById('step2').classList.remove('hidden');
                    if (data.data && data.data.resetToken) {
                        document.getElementById('token').value = data.data.resetToken;
                    }
                } else {
                    showError(data.message);
                }
            })
            .catch(function() {
                showError('Connection error. Make sure the backend is running.');
            });
        });

        document.getElementById('resetForm').addEventListener('submit', function(e) {
            e.preventDefault();
            hideAlerts();

            const token = document.getElementById('token').value.trim();
            const newPassword = document.getElementById('newPassword').value;

            if (!token) {
                showError('Please enter the reset token');
                return;
            }
            if (newPassword.length < 6) {
                showError('Password must be at least 6 characters');
                return;
            }

            fetch(`${API_URL}/api/auth/reset-password`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, newPassword })
            })
            .then(function(res) { return res.json(); })
            .then(function(data) {
                if (data.success) {
                    showSuccess(data.message);
                    document.getElementById('resetForm').reset();
                    setTimeout(function() {
                        window.location.href = 'index.html';
                    }, 1500);
                } else {
                    showError(data.message);
                }
            })
            .catch(function() {
                showError('Connection error. Make sure the backend is running.');
            });
        });
    </script>
</body>
</html>
